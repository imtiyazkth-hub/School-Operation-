<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Firebase Login App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; text-align:center; margin-top:50px;">

<h2>🔥 Firebase Login System</h2>

<input type="email" id="email" placeholder="Enter Email"><br><br>
<input type="password" id="password" placeholder="Enter Password"><br><br>

<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
<button onclick="logout()">Logout</button>

<p id="status"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDcJO_h0zyL5MGows-pOOpg0fErJwy3eeE",
  authDomain: "school-operation.firebaseapp.com",
  projectId: "school-operation",
  storageBucket: "school-operation.appspot.com",
  messagingSenderId: "721955702807",
  appId: "1:721955702807:web:f9c60900c8113fa6967452",
  measurementId: "G-EWMHCS3Y9K"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 Signup (Auto Firestore Entry)
window.signup = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    // Firestore me auto save
    await setDoc(doc(db, "users", user.uid), {
      email: email,
      role: "director",
      name: "Admin"
    });

    document.getElementById("status").innerText = "✅ Signup Successful";
  } catch (error) {
    document.getElementById("status").innerText = "❌ " + error.message;
  }
};

// 🔐 Login
window.login = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    // Firestore check
    const docRef = doc(db, "users", user.uid);
    const docSnap = await getDoc(docRef);

    if (!docSnap.exists()) {
      document.getElementById("status").innerText = "❌ User data missing in Firestore";
      return;
    }

    document.getElementById("status").innerText = "✅ Login Success";
  } catch (error) {
    document.getElementById("status").innerText = "❌ " + error.message;
  }
};

// 🚪 Logout
window.logout = async () => {
  await signOut(auth);
  document.getElementById("status").innerText = "👋 Logged Out";
};

// 🔄 Auto session check
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("status").innerText = "✅ Already Logged In: " + user.email;
  }
});

</script>

</body>
</html>
